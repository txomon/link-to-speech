<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Article to Audio Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 500px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; }
    .saved { color: green; margin-left: 8px; }
  </style>
</head>
<body>
  <h2>Article to Audio Settings</h2>

  <label for="serverUrl">Server URL</label>
  <input type="url" id="serverUrl" placeholder="http://localhost:8080/api/tts">

  <label for="serverSecret">Server Secret (optional)</label>
  <input type="password" id="serverSecret" placeholder="Shared secret for authentication">

  <label for="chatId">Telegram Chat ID (optional)</label>
  <input type="text" id="chatId" placeholder="Your Telegram chat ID">

  <button id="save">Save</button>
  <span id="status" class="saved" hidden>Saved!</span>

  <script src="options.js"></script>
</body>
</html>
