name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd backend
          go build -o ../link-to-speech-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: link-to-speech-${{ matrix.goos }}-${{ matrix.goarch }}

  addon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          cd firefox-addon
          zip -r ../link-to-speech-addon.xpi . -x '*.git*'

      - uses: actions/upload-artifact@v4
        with:
          name: addon
          path: link-to-speech-addon.xpi

  release:
    needs: [backend, addon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/link-to-speech-*
            artifacts/link-to-speech-addon.xpi
